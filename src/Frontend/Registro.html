<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MatteIUCAB | Crear Cuenta</title>
    <!-- CDN de Supabase para la conexión -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(197, 70, 116, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid rgba(244, 114, 152, 0.2);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        .brand {
            background: #d43f6b;
            padding: 1.2rem 2rem;
            text-align: center;
        }

        .brand h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand h1 span {
            font-weight: 300;
            color: #fff0b5;
        }

        .form-container {
            padding: 2rem 2rem 1.8rem;
        }

        .titulo-principal {
            font-size: 1.9rem;
            font-weight: 700;
            color: #b13e61;
            margin-bottom: 0.3rem;
        }

        .subtitulo-registro {
            font-size: 0.9rem;
            color: #a8637c;
            border-left: 3px solid #f7a1c4;
            padding-left: 0.75rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group.hidden {
            display: none !important;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #aa4e72;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        input, .radio-group {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            border: 1.5px solid #ffe0e9;
            border-radius: 1rem;
            background: #fefefe;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
            color: #2d2f36;
        }

        input:focus {
            border-color: #e86f96;
            box-shadow: 0 0 0 3px rgba(216, 67, 105, 0.15);
            background: #ffffff;
        }

        /* ===== ACORDEONES SELECTS ===== */
        .custom-select-wrapper {
            position: relative;
            user-select: none;
        }

        .custom-select-trigger {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            border: 1.5px solid #ffe0e9;
            border-radius: 1rem;
            background: #fefefe;
            color: #2d2f36;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.25s ease;
        }

        .custom-select-wrapper.open .custom-select-trigger {
            border-color: #e86f96;
            box-shadow: 0 0 0 3px rgba(216, 67, 105, 0.15);
            background: #ffffff;
            border-bottom-left-radius: 0.5rem;
            border-bottom-right-radius: 0.5rem;
        }

        .custom-select-trigger::after {
            content: '';
            width: 0.6rem;
            height: 0.6rem;
            border-right: 2px solid #aa4e72;
            border-bottom: 2px solid #aa4e72;
            transform: rotate(45deg);
            margin-right: 0.2rem;
            transition: transform 0.25s ease;
        }

        .custom-select-wrapper.open .custom-select-trigger::after {
            transform: rotate(-135deg);
        }

        .custom-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #ffffff;
            border: 1.5px solid #e86f96;
            border-top: none;
            border-bottom-left-radius: 1rem;
            border-bottom-right-radius: 1rem;
            box-shadow: 0 10px 25px rgba(197, 70, 116, 0.15);
            z-index: 100;
            max-height: 220px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-5px);
            transition: all 0.25s ease;
        }

        .custom-select-wrapper.open .custom-options {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .custom-option {
            padding: 0.75rem 1.2rem;
            font-size: 0.95rem;
            color: #4a4d55;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .custom-option:hover {
            background-color: #fff0b5;
            color: #b13e61;
            font-weight: 600;
            padding-left: 1.5rem;
        }

        .custom-options::-webkit-scrollbar {
            width: 6px;
        }
        .custom-options::-webkit-scrollbar-thumb {
            background-color: #f7a1c4;
            border-radius: 10px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: transparent;
            padding: 0.25rem 0;
            border: none;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #fff5f8;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #ffcddd;
            transition: all 0.15s;
            cursor: pointer;
        }

        .radio-option:hover {
            background: #ffeef3;
            border-color: #e86f96;
        }

        .radio-option input[type="radio"] {
            width: 1rem;
            height: 1rem;
            margin: 0;
            accent-color: #d43f6b;
        }

        .radio-option label {
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            color: #b9476c;
        }

        .btn-crear {
            background: #d43f6b;
            color: white;
            border: none;
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            font-family: inherit;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(212, 63, 107, 0.3);
        }

        .btn-crear:hover {
            background: #b83a61;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin: 1rem 0 1.2rem;
        }

        .login-link a {
            color: #bc5477;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px dashed #f0b8cd;
        }

        .login-link a:hover {
            color: #d43f6b;
            border-bottom-color: #d43f6b;
        }

        .db-status-container {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #ffe0ea;
            text-align: center;
        }

        .btn-check-db {
            background: #fff5f8;
            color: #b13e61;
            border: 1.5px solid #ffcddd;
            padding: 0.6rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: inherit;
        }

        .btn-check-db:hover {
            background: #ffeef3;
            border-color: #e86f96;
            transform: translateY(-1px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #aaa;
            display: inline-block;
        }
        .status-dot.online { background: #2c7a4d; }
        .status-dot.offline { background: #d43f6b; }
        .status-dot.loading { background: #e6a23c; animation: pulseDb 1s infinite; }

        @keyframes pulseDb {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .footer {
            text-align: center;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #ffe0ea;
            font-size: 0.7rem;
            color: #bb7c95;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(45, 20, 30, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #ffffff;
            max-width: 420px;
            width: 90%;
            padding: 2.5rem 2rem;
            border-radius: 2rem;
            text-align: center;
            border: 1px solid rgba(244, 114, 152, 0.25);
            box-shadow: 0 20px 40px rgba(197, 70, 116, 0.3);
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            background: #fff0b5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: #d43f6b;
            box-shadow: 0 8px 20px rgba(212, 63, 107, 0.15);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #b13e61;
            margin-bottom: 0.6rem;
        }

        .modal-text {
            font-size: 0.95rem;
            color: #7a5465;
            line-height: 1.5;
            margin-bottom: 1.8rem;
        }

        .modal-btn {
            background: #d43f6b;
            color: white;
            border: none;
            padding: 0.85rem 2.5rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 2rem;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(212, 63, 107, 0.3);
            transition: all 0.2s ease;
        }

        .modal-btn:hover {
            background: #b83a61;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <h1>Matte<span>IUCAB</span></h1>
    </div>
    <div class="form-container">
        <h2 class="titulo-principal">Crear Nueva Cuenta</h2>
        <div class="subtitulo-registro">Registro</div>

        <form id="signupForm">
            <div class="form-group">
                <label>Tipo de Cuenta</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="tipoCuenta" id="personaRadio" value="Persona" checked>
                        <label for="personaRadio">Persona</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="tipoCuenta" id="empresaRadio" value="Empresa">
                        <label for="empresaRadio">Empresa</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ej: anita99" autocomplete="off" required>
            </div>

            <!-- CAMPO DINÁMICO MUTABLE -->
            <div class="form-group" id="dynamicNameGroup">
                <label id="nameLabel" for="dynamicName">Primer Nombre</label>
                <input type="text" id="dynamicName" name="dynamicName" placeholder="Ej: María" autocomplete="off" required>
            </div>

            <!-- CAMPO EXCLUSIVO DE EMPRESAS -->
            <div class="form-group hidden" id="creditoGroup">
                <label for="lineaCredito">Línea de Crédito ($)</label>
                <input type="number" id="lineaCredito" name="lineaCredito" min="0" step="0.01" placeholder="Ej: 5000.00" autocomplete="off">
            </div>

            <!-- CAMPOS EXCLUSIVOS DE PERSONAS -->
            <div class="form-group" id="segundoNombreGroup">
                <label for="segundoNombre">Segundo Nombre (Opcional)</label>
                <input type="text" id="segundoNombre" name="segundoNombre" placeholder="Ej: Antonieta" autocomplete="off">
            </div>

            <div class="form-group" id="primerApellidoGroup">
                <label for="primerApellido">Primer Apellido</label>
                <input type="text" id="primerApellido" name="primerApellido" placeholder="Ej: González" autocomplete="off" required>
            </div>

            <div class="form-group" id="segundoApellidoGroup">
                <label for="segundoApellido">Segundo Apellido</label>
                <input type="text" id="segundoApellido" name="segundoApellido" placeholder="Ej: Rodríguez" autocomplete="off" required>
            </div>

            <!-- LOCALIZACIÓN DINÁMICA -->
            <div class="form-group">
                <label>Estado</label>
                <div class="custom-select-wrapper" id="estadoWrapper">
                    <div class="custom-select-trigger" id="estadoTrigger">⏳ Cargando estados...</div>
                    <div class="custom-options" id="estadoOptions"></div>
                </div>
                <input type="hidden" id="estadoLugar" name="estadoLugar" required>
            </div>

            <div class="form-group">
                <label>Municipio</label>
                <div class="custom-select-wrapper" id="municipioWrapper">
                    <div class="custom-select-trigger" id="municipioTrigger">Selecciona primero un Estado</div>
                    <div class="custom-options" id="municipioOptions"></div>
                </div>
                <input type="hidden" id="municipioLugar" name="municipioLugar" required>
            </div>

            <div class="form-group">
                <label>Parroquia</label>
                <div class="custom-select-wrapper" id="parroquiaWrapper">
                    <div class="custom-select-trigger" id="parroquiaTrigger">Selecciona primero un Municipio</div>
                    <div class="custom-options" id="parroquiaOptions"></div>
                </div>
                <input type="hidden" id="parroquiaLugar" name="parroquiaLugar" required>
            </div>

            <div class="form-group">
                <label for="direccionDetallada">Dirección Específica</label>
                <input type="text" id="direccionDetallada" name="direccionDetallada" placeholder="Ej: Av. Principal, Casa Nro 10" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" autocomplete="off" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Crea una contraseña segura" autocomplete="new-password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite la contraseña" autocomplete="off" required>
            </div>

            <button type="submit" class="btn-crear">Crear Cuenta</button>

            <div class="login-link">
                <a href="InicioSesion.html">¿Ya tienes cuenta? Iniciar sesión</a>
            </div>

            <div class="db-status-container">
                <button type="button" id="btnCheckDb" class="btn-check-db">
                    <span id="dotDb" class="status-dot"></span>
                    <span id="textDb">Probar conexión con BD</span>
                </button>
            </div>

            <div class="footer">
                © 2026 MatteIUCAB. Todos los derechos reservados.
            </div>
        </form>
    </div>
</div>

<!-- COMPONENTE: MODAL DE ÉXITO -->
<div class="modal-overlay" id="successModal">
    <div class="modal-box">
        <div class="modal-icon">✨</div>
        <h3 class="modal-title">¡Registro Exitoso!</h3>
        <p class="modal-text" id="modalUserMessage"></p>
        <button class="modal-btn" id="modalAcceptBtn">Aceptar</button>
    </div>
</div>

<script>
    // ========== CONFIGURACIÓN DE SUPABASE ==========
    const SUPABASE_URL = 'https://qrigbgqpcwchaykaqrnr.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyaWdiZ3FwY3djaGF5a2Fxcm5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NTY0NjEsImV4cCI6MjA5NTIzMjQ2MX0.tbKXha7EyxDK48dbcwgoI9tFvf1juqCNhCzQHH46D7w'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Mapeo de elementos DOM
    const personaRadio = document.getElementById('personaRadio');
    const empresaRadio = document.getElementById('empresaRadio');
    const nameLabel = document.getElementById('nameLabel');
    const nameInput = document.getElementById('dynamicName');
    
    const creditoGroup = document.getElementById('creditoGroup');
    const creditoInput = document.getElementById('lineaCredito');
    const segundoNombreGroup = document.getElementById('segundoNombreGroup');
    const primerApellidoGroup = document.getElementById('primerApellidoGroup');
    const segundoApellidoGroup = document.getElementById('segundoApellidoGroup');

    // Cambios visuales interactivos según tipo de cuenta
    function alternarFormulario() {
        if (empresaRadio.checked) {
            nameLabel.textContent = "Nombre de la empresa";
            nameInput.placeholder = "Ej: Inversiones Tech, C.A.";
            creditoGroup.classList.remove('hidden');
            creditoInput.setAttribute('required', 'required');
            
            segundoNombreGroup.classList.add('hidden');
            primerApellidoGroup.classList.add('hidden');
            segundoApellidoGroup.classList.add('hidden');
            
            document.getElementById('primerApellido').removeAttribute('required');
            document.getElementById('segundoApellido').removeAttribute('required');
        } else {
            nameLabel.textContent = "Primer Nombre";
            nameInput.placeholder = "Ej: María";
            creditoGroup.classList.add('hidden');
            creditoInput.removeAttribute('required');
            
            segundoNombreGroup.classList.remove('hidden');
            primerApellidoGroup.classList.remove('hidden');
            segundoApellidoGroup.classList.remove('hidden');
            
            document.getElementById('primerApellido').setAttribute('required', 'required');
            document.getElementById('segundoApellido').setAttribute('required', 'required');
        }
    }

    personaRadio.addEventListener('change', alternarFormulario);
    empresaRadio.addEventListener('change', alternarFormulario);

    // ========== MANEJO DE SELECCIÓN DE ACORDEONES ==========
    function vincularAcordeon(wrapperId, triggerId) {
        const wrapper = document.getElementById(wrapperId);
        const trigger = document.getElementById(triggerId);
        trigger.addEventListener('click', () => {
            document.querySelectorAll('.custom-select-wrapper').forEach(w => {
                if(w.id !== wrapperId) w.classList.remove('open');
            });
            wrapper.classList.toggle('open');
        });
    }
    vincularAcordeon('estadoWrapper', 'estadoTrigger');
    vincularAcordeon('municipioWrapper', 'municipioTrigger');
    vincularAcordeon('parroquiaWrapper', 'parroquiaTrigger');

    window.addEventListener('click', (e) => {
        if (!e.target.closest('.custom-select-wrapper')) {
            document.querySelectorAll('.custom-select-wrapper').forEach(w => w.classList.remove('open'));
        }
    });

    // ========== LLENADO DE DATOS DESDE TABLA 'LUGAR' ==========
    async function initEstados() {
        const container = document.getElementById('estadoOptions');
        const trigger = document.getElementById('estadoTrigger');
        try {
            const { data, error } = await supabaseClient.from('lugar').select('l_id, l_nombre').eq('l_tipo', 'Estado');
            if (error) throw error;
            container.innerHTML = '';
            trigger.textContent = 'Selecciona tu Estado';
            data.forEach(est => {
                const opt = document.createElement('div');
                opt.className = 'custom-option';
                opt.textContent = est.l_nombre;
                opt.addEventListener('click', () => {
                    trigger.textContent = est.l_nombre;
                    document.getElementById('estadoLugar').value = est.l_id;
                    document.getElementById('estadoWrapper').classList.remove('open');
                    limpiarSelect('municipioTrigger', 'municipioOptions', 'municipioLugar', 'Selecciona tu Municipio');
                    limpiarSelect('parroquiaTrigger', 'parroquiaOptions', 'parroquiaLugar', 'Selecciona primero un Municipio');
                    initMunicipios(est.l_id);
                });
                container.appendChild(opt);
            });
        } catch (err) { trigger.textContent = 'Fallo al cargar estados'; }
    }

    async function initMunicipios(estadoId) {
        const container = document.getElementById('municipioOptions');
        const trigger = document.getElementById('municipioTrigger');
        trigger.textContent = '⏳ Cargando municipios...';
        try {
            const { data, error } = await supabaseClient.from('lugar').select('l_id, l_nombre').eq('l_tipo', 'Municipio').eq('lugar_l_id', estadoId);
            if (error) throw error;
            container.innerHTML = '';
            trigger.textContent = 'Selecciona tu Municipio';
            data.forEach(mun => {
                const opt = document.createElement('div');
                opt.className = 'custom-option';
                opt.textContent = mun.l_nombre;
                opt.addEventListener('click', () => {
                    trigger.textContent = mun.l_nombre;
                    document.getElementById('municipioLugar').value = mun.l_id;
                    document.getElementById('municipioWrapper').classList.remove('open');
                    limpiarSelect('parroquiaTrigger', 'parroquiaOptions', 'parroquiaLugar', 'Selecciona tu Parroquia');
                    initParroquias(mun.l_id);
                });
                container.appendChild(opt);
            });
        } catch (err) { trigger.textContent = 'Fallo al cargar municipios'; }
    }

    async function initParroquias(municipioId) {
        const container = document.getElementById('parroquiaOptions');
        const trigger = document.getElementById('parroquiaTrigger');
        trigger.textContent = '⏳ Cargando parroquias...';
        try {
            const { data, error } = await supabaseClient.from('lugar').select('l_id, l_nombre').eq('l_tipo', 'Parroquia').eq('lugar_l_id', municipioId);
            if (error) throw error;
            container.innerHTML = '';
            trigger.textContent = 'Selecciona tu Parroquia';
            data.forEach(parq => {
                const opt = document.createElement('div');
                opt.className = 'custom-option';
                opt.textContent = parq.l_nombre;
                opt.addEventListener('click', () => {
                    trigger.textContent = parq.l_nombre;
                    document.getElementById('parroquiaLugar').value = parq.l_id;
                    document.getElementById('parroquiaWrapper').classList.remove('open');
                });
                container.appendChild(opt);
            });
        } catch (err) { trigger.textContent = 'Fallo al cargar parroquias'; }
    }

    function limpiarSelect(trigId, optId, inpId, txt) {
        document.getElementById(trigId).textContent = txt;
        document.getElementById(optId).innerHTML = '';
        document.getElementById(inpId).value = '';
    }

    document.addEventListener('DOMContentLoaded', initEstados);

    // ========== BOTÓN DE DIAGNÓSTICO DE CONEXIÓN ==========
    document.getElementById('btnCheckDb').addEventListener('click', async () => {
        const dot = document.getElementById('dotDb');
        const text = document.getElementById('textDb');
        dot.className = "status-dot loading";
        text.textContent = "Conectando...";
        try {
            const { error } = await supabaseClient.from('lugar').select('l_id').limit(1);
            if (error) throw error;
            dot.className = "status-dot online";
            text.textContent = "Conexión Exitosa";
        } catch (e) {
            dot.className = "status-dot offline";
            text.textContent = "Error de Conexión";
        }
    });

    // ========== ENVÍO DE DATOS EN FORMULARIO ==========
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const mainValueName = nameInput.value.trim();
        const parroquiaId = document.getElementById('parroquiaLugar').value;
        const direccionText = document.getElementById('direccionDetallada').value.trim();
        const email = document.getElementById('email').value.trim();
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (pwd !== confirm) {
            alert('❌ Las contraseñas no coinciden.');
            return;
        }

        try {
            // ---------------------------------------------------------
            // FASE 1: Registro en tabla común 'cliente'
            // ---------------------------------------------------------
            const { data: resCliente, error: errorCliente } = await supabaseClient
                .from('cliente')
                .insert([
                    {
                        cl_direccion: direccionText,
                        cl_email: email,
                        l_id: parseInt(parroquiaId),
                        membresia_mem_id: null
                    }
                ])
                .select('cl_id');

            if (errorCliente) throw new Error(`Error en tabla Cliente: ${errorCliente.message}`);
            if (!resCliente || resCliente.length === 0) throw new Error("No se pudo obtener el ID del cliente registrado.");
            
            const nuevoClienteId = resCliente[0].cl_id;

            // IDENTIFICADORES DE ROLES ASIGNADOS CON ABSOLUTA CERTEZA
            const ROLE_B2C = 2; // Siempre 2 para Persona (cliente_b2c)
            const ROLE_B2B = 3; // Siempre 3 para Empresa (cliente_b2b)

            if (empresaRadio.checked) {
                // ---------------------------------------------------------
                // FLUJO EMPRESA (B2B)
                // ---------------------------------------------------------
                const credito = parseFloat(document.getElementById('lineaCredito').value) || 0;

                const { error: errorB2B } = await supabaseClient
                    .from('cliente_b2b')
                    .insert([
                        {
                            cl_id: nuevoClienteId,
                            clb2b_nombre: mainValueName,
                            clb2b_linea_credito: credito
                        }
                    ]);

                if (errorB2B) throw new Error(`Error en tabla Cliente B2B: ${errorB2B.message}`);

                const { error: errorUserB2B } = await supabaseClient
                    .from('usuario')
                    .insert([
                        { 
                            u_nombre: username, 
                            u_contraseña: pwd, 
                            cliente_cl_id: nuevoClienteId,
                            rol_r_id: ROLE_B2B 
                        }
                    ]);

                if (errorUserB2B) throw new Error(`Error en tabla Usuario (Empresa): ${errorUserB2B.message}`);

            } else {
                // ---------------------------------------------------------
                // FLUJO PERSONA (B2C)
                // ---------------------------------------------------------
                const segundoNombre = document.getElementById('segundoNombre').value.trim();
                const primerApellido = document.getElementById('primerApellido').value.trim();
                const segundoApellido = document.getElementById('segundoApellido').value.trim();

                const { error: errorB2C } = await supabaseClient
                    .from('cliente_b2c')
                    .insert([
                        {
                            cl_id: nuevoClienteId,
                            clb2c_p_nombre: mainValueName,
                            clb2c_s_nombre: segundoNombre || null,
                            // Mapeo exacto apuntando al nombre físico de tu columna detectado en la base de datos
                            clb2b_p_apellido: primerApellido, 
                            clb2b_s_apellido: segundoApellido
                        }
                    ]);

                if (errorB2C) throw new Error(`Error en tabla Cliente B2C: ${errorB2C.message}`);

                const { error: errorUserB2C } = await supabaseClient
                    .from('usuario')
                    .insert([
                        { 
                            u_nombre: username, 
                            u_contraseña: pwd, 
                            cliente_cl_id: nuevoClienteId,
                            rol_r_id: ROLE_B2C // Guarda de manera fija el ID 2
                        }
                    ]);

                if (errorUserB2C) throw new Error(`Error en tabla Usuario (Persona): ${errorUserB2C.message}`);
            }

            // === DESPLEGAR MODAL DE ÉXITO ===
            const modal = document.getElementById('successModal');
            const modalMessage = document.getElementById('modalUserMessage');
            modalMessage.innerHTML = `¡Bienvenido, <strong>${username}</strong>!<br>Tu cuenta de tipo <strong>${empresaRadio.checked ? 'Empresa (B2B)' : 'Persona (B2C)'}</strong> ha sido registrada con éxito.`;
            modal.classList.add('active');

            document.getElementById('modalAcceptBtn').addEventListener('click', () => {
                window.location.href = 'InicioSesion.html';
            });

        } catch (error) {
            console.error(error);
            alert(`Hubo un problema al crear la cuenta: ${error.message}`);
        }
    });
</script>
</body>
</html>
