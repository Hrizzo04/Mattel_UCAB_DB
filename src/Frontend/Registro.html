<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MatteIUCAB | Crear Cuenta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ffe4ec 0%, #ffd9e6 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(197, 70, 116, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid rgba(244, 114, 152, 0.2);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        .brand {
            background: #d43f6b;
            padding: 1.2rem 2rem;
            text-align: center;
        }

        .brand h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand h1 span {
            font-weight: 300;
            color: #fff0b5;
        }

        .form-container {
            padding: 2rem 2rem 1.8rem;
        }

        .titulo-principal {
            font-size: 1.9rem;
            font-weight: 700;
            color: #b13e61;
            margin-bottom: 0.3rem;
        }

        .subtitulo-registro {
            font-size: 0.9rem;
            color: #a8637c;
            border-left: 3px solid #f7a1c4;
            padding-left: 0.75rem;
            margin-bottom: 1.8rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #aa4e72;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3px;
        }

        input, .radio-group {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            border: 1.5px solid #ffe0e9;
            border-radius: 1rem;
            background: #fefefe;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
            color: #2d2f36;
        }

        input:focus {
            border-color: #e86f96;
            box-shadow: 0 0 0 3px rgba(216, 67, 105, 0.15);
            background: #ffffff;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            background: transparent;
            padding: 0.25rem 0;
            border: none;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #fff5f8;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #ffcddd;
            transition: all 0.15s;
            cursor: pointer;
        }

        .radio-option:hover {
            background: #ffeef3;
            border-color: #e86f96;
        }

        .radio-option input[type="radio"] {
            width: 1rem;
            height: 1rem;
            margin: 0;
            accent-color: #d43f6b;
        }

        .radio-option label {
            margin: 0;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            color: #b9476c;
        }

        .btn-crear {
            background: #d43f6b;
            color: white;
            border: none;
            width: 100%;
            padding: 0.9rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
            font-family: inherit;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(212, 63, 107, 0.3);
        }

        .btn-crear:hover {
            background: #b83a61;
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin: 1rem 0 1.2rem;
        }

        .login-link a {
            color: #bc5477;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-bottom: 1px dashed #f0b8cd;
        }

        .login-link a:hover {
            color: #d43f6b;
            border-bottom-color: #d43f6b;
        }

        .footer {
            text-align: center;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #ffe0ea;
            font-size: 0.7rem;
            color: #bb7c95;
        }

        .small-note {
            font-size: 0.7rem;
            color: #cb8aa4;
            margin-top: 0.3rem;
        }

        @media (max-width: 550px) {
            .form-container {
                padding: 1.5rem;
            }
            .radio-group {
                gap: 0.6rem;
            }
            .titulo-principal {
                font-size: 1.6rem;
            }
            .brand h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="brand">
        <h1>Matte<span>IUCAB</span></h1>
    </div>
    <div class="form-container">
        <h2 class="titulo-principal">Crear Nueva Cuenta</h2>
        <div class="subtitulo-registro">Registro</div>

        <form id="signupForm">
            <div class="form-group">
                <label>Tipo de Cuenta</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="tipoCuenta" id="personalRadio" value="Personal" checked>
                        <label for="personalRadio">Personal</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="tipoCuenta" id="empresaRadio" value="Empresa">
                        <label for="empresaRadio">Empresa</label>
                    </div>
                </div>
            </div>

            <div class="form-group" id="dynamicNameGroup">
                <label id="nameLabel" for="dynamicName">Nombre</label>
                <input type="text" id="dynamicName" name="dynamicName" 
                       value="Augmentia Premium" 
                       placeholder="Ej: María González" 
                       autocomplete="off">
                <div class="small-note" id="noteDynamic">* Puedes editarlo libremente</div>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" 
                       placeholder="tucorreo@ejemplo.com" 
                       value="contacto@tugienail.com"
                       autocomplete="off">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" 
                       placeholder="Crea una contraseña segura" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" 
                       placeholder="Repite la contraseña" autocomplete="off">
            </div>

            <button type="submit" class="btn-crear">Crear Cuenta</button>

            <!-- Enlace actualizado para que apunte a login.html -->
            <div class="login-link">
                <a href="InicioSesion.html">¿Ya tienes cuenta? sesión</a>
            </div>

            <div class="footer">
                © 2023 MatteIUCAB. Todos los derechos reservados.
            </div>
        </form>
    </div>
</div>

<script>
    // Lógica dinámica de cambio entre Personal y Empresa
    const personalRadio = document.getElementById('personalRadio');
    const empresaRadio = document.getElementById('empresaRadio');
    const nameLabel = document.getElementById('nameLabel');
    const nameInput = document.getElementById('dynamicName');
    const noteSpan = document.getElementById('noteDynamic');

    function updateNameField() {
        if (personalRadio.checked) {
            nameLabel.textContent = "Nombre";
            nameInput.placeholder = "Ej: Ana Rodríguez, Carlos Pérez";
            noteSpan.textContent = "* Tu nombre completo o alias";
        } else {
            nameLabel.textContent = "Nombre de la Empresa";
            nameInput.placeholder = "Ej: Soluciones Global, TechCorp";
            noteSpan.textContent = "* Razón social o nombre comercial";
        }
    }

    personalRadio.addEventListener('change', updateNameField);
    empresaRadio.addEventListener('change', updateNameField);
    updateNameField();

    // Borrar ejemplos al focus
    const defaultValueNombre = "Augmentia Premium";
    const defaultValueEmail = "contacto@tugienail.com";
    
    function attachClearOnFocus(input, defaultValue) {
        input.dataset.cleaned = "false";
        input.addEventListener('focus', function() {
            if (input.dataset.cleaned === "false" && input.value === defaultValue) {
                input.value = '';
                input.dataset.cleaned = "true";
            }
        });
    }
    attachClearOnFocus(nameInput, defaultValueNombre);
    attachClearOnFocus(document.getElementById('email'), defaultValueEmail);

    // Validación de contraseñas
    const form = document.getElementById('signupForm');
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const email = document.getElementById('email').value.trim();
        const nombre = nameInput.value.trim();

        if (!pwd || !confirm) {
            alert('🔐 Por favor, completa los campos de contraseña.');
            return;
        }
        if (pwd !== confirm) {
            alert('❌ Las contraseñas no coinciden.');
            return;
        }
        if (!email) {
            alert('📧 El correo electrónico es obligatorio.');
            return;
        }
        let tipo = personalRadio.checked ? "Personal" : "Empresa";
        alert(`✅ Registro exitoso (DEMO)\n\nTipo: ${tipo}\n${nameLabel.textContent}: ${nombre}\nCorreo: ${email}`);
    });
</script>
</body>
</html>
