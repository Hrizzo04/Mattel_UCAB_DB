<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MatteUCAB | Crear Nuevo Rol</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ------ RESET Y FONDO ------ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* ------ MODAL (simulado) ------ */
        .modal {
            background: #ffffff;
            border-radius: 2rem;
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            border: 1px solid #ffe0e9;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }
        .modal-header h2 {
            color: #b13e61;
            font-size: 1.6rem;
            font-weight: 700;
        }
        .modal-header p {
            color: #a8637c;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }
        .modal-close {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            color: #a8637c;
            cursor: pointer;
            transition: 0.2s;
            padding: 0 0.5rem;
            text-decoration: none;
        }
        .modal-close:hover {
            color: #d43f6b;
            transform: rotate(90deg);
        }

        /* ------ FORMULARIO ------ */
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #aa4e72;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1.5px solid #ffe0e9;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
            outline: none;
            background: #fefefe;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #d43f6b;
            box-shadow: 0 0 0 3px rgba(212, 63, 107, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .form-row .form-group {
            flex: 1;
            min-width: 180px;
        }

        /* ------ TABLA DE PERMISOS ------ */
        .permisos-tabla {
            margin: 1.2rem 0;
            overflow-x: auto;
        }
        .permisos-tabla table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .permisos-tabla th,
        .permisos-tabla td {
            padding: 0.6rem 0.5rem;
            text-align: center;
            border-bottom: 1px solid #f0e2e8;
        }
        .permisos-tabla th {
            background: #fff5f8;
            color: #b13e61;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .permisos-tabla td:first-child {
            text-align: left;
            font-weight: 500;
            color: #4a3a42;
        }
        .permisos-tabla input[type="checkbox"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: #d43f6b;
            cursor: pointer;
        }
        .leyenda {
            font-size: 0.7rem;
            color: #a8637c;
            margin-top: 0.3rem;
            text-align: right;
        }
        .leyenda span {
            font-weight: 600;
        }

        /* ------ BOTONES ------ */
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-actions .btn-cancelar {
            background: transparent;
            border: 1px solid #d43f6b;
            color: #d43f6b;
            padding: 0.6rem 1.8rem;
            border-radius: 3rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .modal-actions .btn-cancelar:hover {
            background: #d43f6b;
            color: #fff;
        }
        .modal-actions .btn-crear {
            background: #d43f6b;
            border: none;
            color: #fff;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(212, 63, 107, 0.3);
        }
        .modal-actions .btn-crear:hover {
            background: #b83a61;
            transform: translateY(-2px);
        }

        /* ------ RESPONSIVE ------ */
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .modal {
                padding: 1.5rem;
            }
            .form-row {
                flex-direction: column;
            }
            .modal-actions {
                flex-direction: column;
            }
            .modal-actions .btn-cancelar,
            .modal-actions .btn-crear {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="modal">
        <!-- Encabezado -->
        <div class="modal-header">
            <div>
                <h2>Crear Nuevo Rol</h2>
                <p>Define un rol personalizado y selecciona los permisos que tendrá</p>
            </div>
            <a href="roles.html" class="modal-close" title="Cerrar y volver">&times;</a>
        </div>

        <!-- Formulario -->
        <form id="formNuevoRol">
            <div class="form-row">
                <div class="form-group">
                    <label for="nombreRol">Nombre del Rol</label>
                    <input type="text" id="nombreRol" placeholder="ej. Gerente de Ventas" />
                </div>
                <div class="form-group">
                    <label for="colorRol">Color Identificador</label>
                    <input type="color" id="colorRol" value="#d43f6b" style="padding:0.3rem; height:45px;" />
                </div>
            </div>
            <div class="form-group">
                <label for="descripcionRol">Descripción</label>
                <textarea id="descripcionRol" placeholder="Describe las responsabilidades de este rol..."></textarea>
            </div>

            <!-- Tabla de permisos -->
            <div class="permisos-tabla">
                <table>
                    <thead>
                        <tr>
                            <th>Módulo</th>
                            <th>Crear <span style="font-weight:400; color:#888;">(C)</span></th>
                            <th>Ver <span style="font-weight:400; color:#888;">(V)</span></th>
                            <th>Editar <span style="font-weight:400; color:#888;">(E)</span></th>
                            <th>Eliminar <span style="font-weight:400; color:#888;">(D)</span></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Productos</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                        <tr>
                            <td>Inventario</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                        <tr>
                            <td>Proveedores</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                        <tr>
                            <td>Clientes</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                        <tr>
                            <td>Órdenes B2B</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                        <tr>
                            <td>Órdenes B2C</td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                            <td><input type="checkbox" checked /></td>
                        </tr>
                    </tbody>
                </table>
                <div class="leyenda">
                    <span>C</span> = Crear | <span>V</span> = Ver | <span>E</span> = Editar | <span>D</span> = Eliminar
                </div>
            </div>

            <!-- Acciones -->
            <div class="modal-actions">
                <a href="roles.html" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-crear">Crear Rol</button>
            </div>
        </form>
    </div>

    <script>
        // ----- MANEJO DEL ENVÍO DEL FORMULARIO (demo) -----
        document.getElementById('formNuevoRol').addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombreRol').value.trim();
            const color = document.getElementById('colorRol').value;
            const descripcion = document.getElementById('descripcionRol').value.trim();

            // Recoger los checkboxes de la tabla (solo para mostrar en consola)
            const checkboxes = document.querySelectorAll('#formNuevoRol input[type="checkbox"]');
            const permisos = {};
            checkboxes.forEach((cb, index) => {
                const row = cb.closest('tr');
                const modulo = row ? row.cells[0].textContent.trim() : 'Módulo' + index;
                const columna = cb.closest('td');
                const permiso = columna ? columna.cellIndex : 0;
                // Solo para demo, mostramos en consola
                console.log(`Módulo: ${modulo}, Permiso #${permiso}, activado: ${cb.checked}`);
            });

            alert(`✅ Rol "${nombre || 'Sin nombre'}" creado (demo).\nColor: ${color}\nDescripción: ${descripcion || 'Sin descripción'}\nRevisa la consola para ver los permisos.`);

            // Redirigir a roles.html después del alert
            window.location.href = 'roles.html';
        });
    </script>
</body>
</html>
